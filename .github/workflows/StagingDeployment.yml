name: Deploy Theme to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    environment: staging
    runs-on: ubuntu-latest
    env:
      LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
      LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
      LIGHTSAIL_PORT: ${{ secrets.LIGHTSAIL_PORT }}
      STAGING_THEME_PATH: ${{ secrets.STAGING_THEME_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$LIGHTSAIL_HOST" ]; then
            echo "Missing LIGHTSAIL_HOST secret in staging environment."
            exit 1
          fi

          if [ -z "$LIGHTSAIL_USER" ]; then
            echo "Missing LIGHTSAIL_USER secret in staging environment."
            exit 1
          fi

          if [ -z "${{ secrets.LIGHTSAIL_SSH_KEY }}" ]; then
            echo "Missing LIGHTSAIL_SSH_KEY secret in staging environment."
            exit 1
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          PORT="${LIGHTSAIL_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote theme directory exists
        run: |
          PORT="${LIGHTSAIL_PORT:-22}"
          TARGET_PATH="${STAGING_THEME_PATH:-/opt/bitnami/wordpress/wp-content/themes/kctennisblastteam6}"
          ssh -p "$PORT" "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" "sudo mkdir -p '$TARGET_PATH'"

      - name: Deploy theme files to staging
        run: |
          PORT="${LIGHTSAIL_PORT:-22}"
          TARGET_PATH="${STAGING_THEME_PATH:-/opt/bitnami/wordpress/wp-content/themes/kctennisblastteam6}"
          rsync -az --delete \
            --rsync-path="sudo rsync" \
            -e "ssh -p $PORT" \
            ./wp-content/themes/kctennisblastteam6/ \
            "$LIGHTSAIL_USER@$LIGHTSAIL_HOST:$TARGET_PATH/"


